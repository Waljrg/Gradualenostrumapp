<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afinador Imperial Pro | Master Voice Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<script type="module" src="backbutton.js"></script>
    <style>
        :root {
            --primary: #1A1514; 
            --accent: #B8860B;  
            --accent-light: #E8D4A2;
            --gold-gradient: linear-gradient(135deg, #B8860B 0%, #F3CF7A 50%, #B8860B 100%);
            --bg: #0F0D0C;
            --surface: #1E1A19;
            --text: #E8D4A2;
            --radius: 20px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #saved-profile {
            position: absolute;
            top: 20px;
            background: rgba(184, 134, 11, 0.15);
            border: 1px solid var(--accent);
            padding: 10px 20px;
            border-radius: 50px;
            display: none;
            backdrop-filter: blur(5px);
            z-index: 5;
        }

        #saved-profile span {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: var(--accent-light);
        }

        .tuner-card {
            background: var(--surface);
            padding: 40px;
            border-radius: var(--radius);
            border: 2px solid var(--accent);
            box-shadow: 0 0 50px rgba(184, 134, 11, 0.2);
            text-align: center;
            max-width: 420px;
            width: 90%;
            position: relative;
        }

        h1 {
            font-family: 'Cinzel', serif;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 30px 0;
            letter-spacing: 3px;
        }

        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .range-vocal-ui, .voice-train-ui {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--accent);
        }

        .step-indicator {
            font-family: 'Cinzel', serif;
            color: var(--accent-light);
            font-size: 0.9rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .capture-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .note-slot {
            background: #2c211f;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
        }

        .note-slot.active { border-color: #FFD700; box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }

        .slot-label { font-size: 0.6rem; color: #888; text-transform: uppercase; }
        .slot-val { font-size: 1.4rem; font-family: 'Cinzel', serif; color: white; display: block; }

        .stability-bar {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }

        #stability-fill, #train-stability-fill {
            width: 0%;
            height: 100%;
            background: var(--gold-gradient);
            transition: width 0.1s linear;
        }

        .gauge-outer {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: radial-gradient(circle, #2c211f 0%, #0f0d0c 100%);
            border: 4px solid var(--accent);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gauge-outer.tuned { border-color: #FFF; box-shadow: 0 0 30px #FFD700; }

        #note-display { font-family: 'Cinzel', serif; font-size: 4rem; color: white; }
        
        .meter-container { width: 100%; height: 30px; position: relative; margin: 15px 0; }
        .scale { width: 100%; height: 2px; background: #333; position: absolute; top: 50%; }
        #needle-pro {
            width: 3px; height: 20px; background: var(--gold-gradient);
            position: absolute; left: 50%; top: 5px; transform: translateX(-50%);
            transition: left 0.05s linear;
        }

        .btn-main {
            background: var(--gold-gradient); color: var(--primary);
            border: none; padding: 18px; border-radius: 12px;
            font-family: 'Cinzel', serif; font-weight: 700;
            width: 100%; cursor: pointer; margin-bottom: 10px;
        }

        .btn-secondary {
            background: rgba(184, 134, 11, 0.2); color: var(--accent-light);
            border: 1px solid var(--accent); padding: 12px; border-radius: 10px;
            font-family: 'Cinzel', serif; font-size: 0.8rem;
            width: 100%; cursor: pointer; margin-bottom: 10px; transition: 0.3s;
        }
        .btn-secondary:hover { background: rgba(184, 134, 11, 0.4); }

        .btn-back { color: var(--accent); background: none; border: none; cursor: pointer; font-family: 'Cinzel', serif; text-decoration: underline; }

        #result-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--surface); border-radius: var(--radius);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="saved-profile">
    <span>MI VOZ: <b id="profile-text">--</b> | RANGO: <b id="profile-range">--</b></span>
</div>

<div class="tuner-card">
    <div id="result-overlay">
        <h1 style="font-size: 1.2rem;">Tu Tesitura es:</h1>
        <div id="final-voice-type" style="font-family: 'Cinzel'; font-size: 2.5rem; color: #FFD700; margin: 20px 0;">--</div>
        <p id="final-range-text" style="font-family: 'JetBrains Mono'; font-size: 0.9rem;">--</p>
        <button class="btn-main" style="width: 80%; margin-top: 30px;" onclick="resetRangeCapture()">REPETIR PRUEBA</button>
        <button class="btn-back" onclick="stopApp()">VOLVER AL MENÚ</button>
    </div>

    <div id="menu-view" class="view active">
        <h1>Afinador Imperial</h1>
        <button class="btn-main" onclick="initAndStart('Guitarra')">Afinador de Guitarra</button>
        <button class="btn-main" onclick="initAndStart('Rango')">Analizador de Tesitura</button>
        <button class="btn-main" onclick="initAndStart('Voz')">Entrenamiento Vocal</button>
    </div>

    <div id="tuner-view" class="view">
        <h1 id="title-text">PRO TUNER</h1>
        
        <div id="range-vocal-ui" class="range-vocal-ui" style="display: none;">
            <div class="step-indicator" id="step-msg">Canta la nota más GRAVE que puedas</div>
            <div class="capture-box">
                <div class="note-slot" id="slot-low"><span class="slot-label">Grave</span><span class="slot-val" id="low-val">--</span></div>
                <div class="note-slot" id="slot-high"><span class="slot-label">Aguda</span><span class="slot-val" id="high-val">--</span></div>
            </div>
            <div class="stability-bar"><div id="stability-fill"></div></div>
        </div>

        <div id="voice-train-ui" class="voice-train-ui" style="display: none;">
            <div class="step-indicator">Escucha y Repite la Nota de tu Rango</div>
            <button class="btn-secondary" id="btn-piano-single" onclick="playTargetNote()">REPRODUCIR PIANO (NOTA)</button>
            <button class="btn-secondary" id="btn-piano-seq" onclick="playVocalSequence()">EJERCICIO "MA-MA" (PIANO)</button>
            <div class="stability-bar" style="margin-top:15px;"><div id="train-stability-fill"></div></div>
        </div>

        <div id="guitar-grid" class="string-selector" style="display:none; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-bottom: 20px;">
            <button class="string-btn" onclick="setTarget(82.41, 0)" style="background:rgba(184,134,11,0.1); border:1px solid var(--accent); color:var(--accent-light); border-radius:5px; padding:5px;">E2</button>
            <button class="string-btn" onclick="setTarget(110.00, 1)" style="background:rgba(184,134,11,0.1); border:1px solid var(--accent); color:var(--accent-light); border-radius:5px; padding:5px;">A2</button>
            <button class="string-btn" onclick="setTarget(146.83, 2)" style="background:rgba(184,134,11,0.1); border:1px solid var(--accent); color:var(--accent-light); border-radius:5px; padding:5px;">D3</button>
            <button class="string-btn" onclick="setTarget(196.00, 3)" style="background:rgba(184,134,11,0.1); border:1px solid var(--accent); color:var(--accent-light); border-radius:5px; padding:5px;">G3</button>
            <button class="string-btn" onclick="setTarget(246.94, 4)" style="background:rgba(184,134,11,0.1); border:1px solid var(--accent); color:var(--accent-light); border-radius:5px; padding:5px;">B3</button>
            <button class="string-btn" onclick="setTarget(329.63, 5)" style="background:rgba(184,134,11,0.1); border:1px solid var(--accent); color:var(--accent-light); border-radius:5px; padding:5px;">E4</button>
        </div>

        <div class="gauge-outer" id="gauge">
            <div id="note-display">--</div>
            <div style="position:absolute; bottom:15px; font-family:'JetBrains Mono'; font-size:0.7rem;">
                <span id="freq-pro">0.00</span> Hz
            </div>
        </div>

        <div class="meter-container">
            <div class="scale"></div>
            <div id="needle-pro"></div>
        </div>

        <button class="btn-back" onclick="stopApp()">← CANCELAR</button>
    </div>
</div>
<script type="module">
    import { App } from 'https://cdn.jsdelivr.net/npm/@capacitor/app@latest/dist/esm/index.js';

    window.onload = function() {
        App.addListener('backButton', () => {
            const pagina = window.location.pathname.split("/").pop();

            if (pagina === 'index.html' || pagina === '') {
                App.exitApp();
            } else {
                window.location.assign('index.html');
            }
        });
    };
</script>


<script>
    let audioCtx, analyser, microphone, scriptNode;
    let currentMode = "";
    let targetFreq = null;
    let stage = 0, capturedLow = null, capturedHigh = null;
    let stabilityCounter = 0, lastStableNote = "";
    let piano;

    const NOTES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

    // Redirigir a index.html al presionar botón atrás físico
    function handleHardwareBack() {
        history.pushState(null, null, window.location.pathname);
        window.addEventListener('popstate', function (event) {
            window.location.assign('index.html');
        });
    }

    window.onload = function() {
        loadVocalProfile();
        handleHardwareBack();
    };

    async function initAndStart(mode) {
        await Tone.start();
        
        if (!piano) {
            piano = new Tone.Sampler({
                urls: {
                    A0: "A0.mp3", C1: "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3",
                    A1: "A1.mp3", C2: "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3",
                    A2: "A2.mp3", C3: "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3",
                    A3: "A3.mp3", C4: "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3",
                    A4: "A4.mp3", C5: "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3",
                    A5: "A5.mp3", C6: "C6.mp3"
                },
                release: 1,
                baseUrl: "https://tonejs.github.io/audio/salamander/"
            }).toDestination();
        }

        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        
        Tone.loaded().then(() => {
            startApp(mode);
        });
    }

    function loadVocalProfile() {
        const type = localStorage.getItem('imperial_voice_type'), range = localStorage.getItem('imperial_voice_range');
        if (type && range) {
            document.getElementById('saved-profile').style.display = 'block';
            document.getElementById('profile-text').innerText = type;
            document.getElementById('profile-range').innerText = range;
        }
    }

    function generateRandomVocalTask() {
        let pool = [130.81, 146.83, 164.81, 174.61, 196.00, 220.00, 246.94, 261.63];
        const savedType = localStorage.getItem('imperial_voice_type');

        if (savedType === "SOPRANO") pool = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25];
        else if (savedType === "MEZZO") pool = [220.00, 246.94, 261.63, 329.63, 349.23, 440.00];
        else if (savedType === "CONTRALTO") pool = [174.61, 196.00, 220.00, 261.63, 293.66, 349.23];
        else if (savedType === "TENOR") pool = [130.81, 146.83, 174.61, 196.00, 220.00, 261.63];
        else if (savedType === "BARÍTONO") pool = [110.00, 130.81, 146.83, 164.81, 196.00, 220.00];
        else if (savedType === "BAJO") pool = [82.41, 98.00, 110.00, 130.81, 146.83, 164.81];

        targetFreq = pool[Math.floor(Math.random() * pool.length)];
        stabilityCounter = 0;
        playTargetNote();
    }

    function playTargetNote() {
        if (!piano || !targetFreq) return;
        piano.triggerAttackRelease(targetFreq, "1.5");
    }

    function playVocalSequence() {
        if (!piano || !targetFreq) return;
        const now = Tone.now();
        const intervals = [0, 2, 4, 5, 7, 5, 4, 2, 0];
        intervals.forEach((interval, i) => {
            const freq = targetFreq * Math.pow(2, interval / 12);
            piano.triggerAttackRelease(freq, "8n", now + i * 0.45);
        });
    }

    function playSuccessTone() {
        if (piano) piano.triggerAttackRelease("C5", "8n");
    }

    async function startApp(mode) {
        currentMode = mode;
        document.getElementById('menu-view').classList.remove('active');
        document.getElementById('tuner-view').classList.add('active');
        document.getElementById('range-vocal-ui').style.display = (mode === 'Rango' ? 'block' : 'none');
        document.getElementById('voice-train-ui').style.display = (mode === 'Voz' ? 'block' : 'none');
        document.getElementById('guitar-grid').style.display = (mode === 'Guitarra' ? 'grid' : 'none');
        document.getElementById('title-text').innerText = mode === 'Voz' ? 'ENTRENAMIENTO' : mode.toUpperCase();

        if (mode === 'Rango') resetRangeCapture();
        if (mode === 'Voz') generateRandomVocalTask();

        const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: true } });
        microphone = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser(); 
        analyser.fftSize = 4096;
        scriptNode = audioCtx.createScriptProcessor(2048, 1, 1);

        scriptNode.onaudioprocess = (e) => {
            const freq = detectPitchYIN(e.inputBuffer.getChannelData(0), audioCtx.sampleRate);
            if (freq > 40 && freq < 1500) processAudioFrame(freq);
            else { stabilityCounter = 0; updateStabilityBar(0); }
        };
        microphone.connect(scriptNode); 
        scriptNode.connect(audioCtx.destination);
    }

    function processAudioFrame(freq) {
        document.getElementById('freq-pro').innerText = freq.toFixed(2);
        const semi = 12 * (Math.log2(freq / 440)), noteNum = Math.round(semi) + 69;
        document.getElementById('note-display').innerText = NOTES[(noteNum % 12 + 12) % 12];
        
        const diffCents = targetFreq ? 1200 * Math.log2(freq / targetFreq) : 1200 * Math.log2(freq / (440 * Math.pow(2, Math.round(semi) / 12)));
        document.getElementById('needle-pro').style.left = (50 + diffCents/2) + "%";

        const isTuned = Math.abs(diffCents) < 5;
        document.getElementById('gauge').classList.toggle('tuned', isTuned);

        const noteName = NOTES[(noteNum % 12 + 12) % 12] + (Math.floor(noteNum / 12) - 1);
        if (currentMode === 'Rango') handleRangeLogic(noteName, freq);
        if (currentMode === 'Voz') handleTrainLogic(isTuned);
    }

    function handleTrainLogic(isTuned) {
        if (isTuned) {
            stabilityCounter++;
            updateStabilityBar((stabilityCounter / 40) * 100);
            if (stabilityCounter >= 40) {
                playSuccessTone();
                setTimeout(() => generateRandomVocalTask(), 1200);
            }
        } else {
            stabilityCounter = Math.max(0, stabilityCounter - 0.5);
            updateStabilityBar((stabilityCounter / 40) * 100);
        }
    }

    function updateStabilityBar(val) {
        const id = currentMode === 'Rango' ? 'stability-fill' : 'train-stability-fill';
        const el = document.getElementById(id);
        if (el) el.style.width = val + "%";
    }

    function handleRangeLogic(noteName, freq) {
        if (noteName === lastStableNote) {
            stabilityCounter++;
            updateStabilityBar((stabilityCounter / 30) * 100);
            if (stabilityCounter >= 30) {
                if (stage === 0) {
                    capturedLow = { name: noteName, freq: freq };
                    document.getElementById('low-val').innerText = noteName;
                    document.getElementById('slot-low').classList.remove('active');
                    document.getElementById('slot-high').classList.add('active');
                    document.getElementById('step-msg').innerText = "Canta la nota más AGUDA";
                    playSuccessTone(); stage = 1; stabilityCounter = 0;
                } else {
                    capturedHigh = { name: noteName, freq: freq };
                    document.getElementById('high-val').innerText = noteName;
                    showFinalResult();
                }
            }
        } else { lastStableNote = noteName; stabilityCounter = 0; updateStabilityBar(0); }
    }

    function showFinalResult() {
        let type = capturedLow.freq > 165 ? "SOPRANO" : capturedLow.freq > 145 ? "MEZZO" : capturedLow.freq > 125 ? "CONTRALTO" : capturedLow.freq > 105 ? "TENOR" : capturedLow.freq > 85 ? "BARÍTONO" : "BAJO";
        const range = `${capturedLow.name}-${capturedHigh.name}`;
        
        document.getElementById('final-voice-type').innerText = type;
        document.getElementById('final-range-text').innerText = range;
        
        localStorage.setItem('imperial_voice_type', type);
        localStorage.setItem('imperial_voice_range', range);
        loadVocalProfile();
        
        document.getElementById('result-overlay').style.display = "flex";
        playSuccessTone();

        // INTEGRACIÓN CON DIRECTORIO: Envía el dato a la ventana principal
        if (window.opener) {
            window.opener.postMessage({ rangoVocal: range }, "*");
            // Opcional: Cerrar automáticamente después de 2 segundos para volver al perfil
            setTimeout(() => { window.close(); }, 2500);
        }
    }

    function resetRangeCapture() {
        stage = 0; capturedLow = null; capturedHigh = null;
        document.getElementById('low-val').innerText = "--"; 
        document.getElementById('high-val').innerText = "--";
        document.getElementById('slot-low').classList.add('active'); 
        document.getElementById('slot-high').classList.remove('active');
        document.getElementById('result-overlay').style.display = "none";
    }

    function detectPitchYIN(buffer, sr) {
        const threshold = 0.1, halfSize = Math.floor(buffer.length / 2);
        let yinBuffer = new Float32Array(halfSize);
        for (let tau = 0; tau < halfSize; tau++) {
            for (let i = 0; i < halfSize; i++) {
                const delta = buffer[i] - buffer[i + tau];
                yinBuffer[tau] += delta * delta;
            }
        }
        let runningSum = 0; yinBuffer[0] = 1;
        for (let tau = 1; tau < halfSize; tau++) { runningSum += yinBuffer[tau]; yinBuffer[tau] *= tau / runningSum; }
        let tau = -1;
        for (let t = 1; t < halfSize; t++) { if (yinBuffer[t] < threshold) { while (t + 1 < halfSize && yinBuffer[t + 1] < yinBuffer[t]) t++; tau = t; break; } }
        if (tau === -1) return -1;
        let betterTau = tau, x0 = tau - 1, x2 = tau + 1;
        if (x0 >= 0 && x2 < halfSize) { const s0 = yinBuffer[x0], s1 = yinBuffer[tau], s2 = yinBuffer[x2]; betterTau = tau + (s2 - s0) / (2 * (2 * s1 - s2 - s0)); }
        return sr / betterTau;
    }

    function stopApp() {
        if (microphone) { microphone.disconnect(); scriptNode.disconnect(); }
        document.getElementById('tuner-view').classList.remove('active');
        document.getElementById('menu-view').classList.add('active');
        document.getElementById('result-overlay').style.display = "none";
        targetFreq = null;
    }
    
    function setTarget(f) { targetFreq = f; }
</script>
</body>
</html>

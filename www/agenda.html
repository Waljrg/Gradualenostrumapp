<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agenda Nostra | Sistema Jerárquico</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root {
            --primary: #2C211F; --accent: #B8860B; --accent-light: #E8D4A2;
            --bg: #FDFBF7; --surface: #FFFFFF; --text: #3E322E;
            --border: 1px solid rgba(184, 134, 11, 0.2);
            --radius-md: 16px; --radius-lg: 30px;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        
        header { 
            background: linear-gradient(135deg, var(--primary) 0%, #4A3632 100%); 
            color: var(--accent-light); padding: 2rem 1rem; text-align: center;
            border-bottom: 4px solid var(--accent); border-bottom-left-radius: var(--radius-lg); border-bottom-right-radius: var(--radius-lg);
        }
        h1 { font-family: 'Cinzel', serif; margin: 0; font-size: 1.4rem; }

        .container { padding: 20px; max-width: 600px; margin: auto; }

        .card {
            background: var(--surface); padding: 20px; border-radius: var(--radius-md);
            margin-bottom: 12px; border: var(--border); border-left: 6px solid var(--accent);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative; cursor: pointer;
        }

        .card-actions { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; z-index: 10; }
        .btn-icon { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 1rem; }
        .btn-icon.delete { color: #8b0000; }

        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; font-weight: bold; margin-bottom: 5px; font-family: 'Cinzel'; color: var(--primary); }
        input, textarea { width: 100%; padding: 12px; border-radius: 10px; border: var(--border); box-sizing: border-box; font-family: 'Inter'; background: white; }
        
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: var(--accent-light); border: 1px solid var(--accent); }
        .btn-back { background: transparent; color: var(--primary); text-align: left; padding: 0; margin-bottom: 10px; border: none; cursor: pointer; font-family: 'Inter'; }

        .member-tag { background: var(--accent-light); font-size: 0.7rem; padding: 4px 10px; border-radius: 8px; margin: 2px; display: inline-flex; align-items: center; gap: 5px; color: var(--primary); font-weight: bold; }

        .fab { 
            position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px;
            border-radius: 50%; background: var(--primary); color: var(--accent-light);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); font-size: 1.6rem;
            border: 2px solid var(--accent); cursor: pointer; z-index: 100;
        }
        .fab-sub { bottom: 110px; width: 55px; height: 55px; font-size: 1.3rem; background: var(--accent); color: var(--primary); }
    </style>
</head>
<body>

<header><h1 id="headerTitle">AGENDAS MADRE</h1></header>

<div class="container">
    <div id="madreListView" class="view active"><div id="madreContainer"></div></div>

    <div id="madreFormView" class="view">
        <button class="btn btn-back" onclick="showView('madreListView')"><i class="fas fa-arrow-left"></i> Volver</button>
        <h2 id="madreFormTitle">Nueva Agenda Madre</h2>
        <div class="form-group">
            <label>Nombre del Grupo</label>
            <input type="text" id="nombreMadre" placeholder="Ej: Coro Parroquial">
        </div>
        <div class="form-group">
            <label>Agregar Miembro (Correo)</label>
            <div style="display: flex; gap: 5px;">
                <input type="email" id="inputCorreo" placeholder="correo@mail.com">
                <button class="btn btn-primary" style="width: 50px; margin: 0;" onclick="addMiembro()">+</button>
            </div>
            <div id="listaMiembrosUI" style="margin-top: 10px;"></div>
        </div>
        <button class="btn btn-primary" onclick="saveMadre()">GUARDAR AGENDA MADRE</button>
    </div>

    <div id="subListView" class="view">
        <button class="btn btn-back" onclick="showView('madreListView')"><i class="fas fa-arrow-left"></i> Volver</button>
        <h2 id="currentMadreTitle" style="font-family: 'Cinzel'; color: var(--accent);"></h2>
        <div id="subContainer"></div>
    </div>

    <div id="subFormView" class="view">
        <button class="btn btn-back" onclick="showView('subListView')"><i class="fas fa-arrow-left"></i> Cancelar</button>
        <h2 id="subFormTitle">Nueva Actividad</h2>
        <div class="form-group">
            <label>Título</label>
            <input type="text" id="tituloSub">
        </div>
        <div class="form-group">
            <label>Descripción</label>
            <textarea id="descSub" rows="4"></textarea>
        </div>
        <button class="btn btn-primary" onclick="saveSub()">GUARDAR ACTIVIDAD</button>
    </div>
</div>

<div class="fab" id="fabMadre" onclick="openMadreForm()"><i class="fas fa-folder-plus"></i></div>
<div class="fab fab-sub" id="fabSub" style="display: none;" onclick="openSubForm()"><i class="fas fa-plus"></i></div>

<script>
    // --- IMPORTANTE: PEGA AQUÍ TUS CREDENCIALES DEL CANTORAL ---
    const firebaseConfig = {
        apiKey: "REEMPLAZAR_CON_TU_API_KEY",
        authDomain: "REEMPLAZAR_CON_TU_DOMINIO",
        projectId: "REEMPLAZAR_CON_TU_ID",
        storageBucket: "REEMPLAZAR_CON_TU_BUCKET",
        messagingSenderId: "REEMPLAZAR_CON_TU_SENDER",
        appId: "TU_APP_ID"
    };

    // Inicialización segura
    let db, auth;
    try {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        auth = firebase.auth();
    } catch(e) { console.log("Firebase no configurado, usando modo local."); }

    let agendasMadre = []; 
    let currentMadreId = null;
    let editingMadreId = null;
    let miembrosTemporales = [];

    // --- FUNCIONES DE NAVEGACIÓN ---
    function showView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        document.getElementById('fabMadre').style.display = (viewId === 'madreListView') ? 'flex' : 'none';
        document.getElementById('fabSub').style.display = (viewId === 'subListView') ? 'flex' : 'none';
    }

    // --- LÓGICA AGENDAS MADRE ---
    function openMadreForm() {
        editingMadreId = null;
        // Si hay usuario logueado lo ponemos por defecto, si no, lista vacía
        const userEmail = auth && auth.currentUser ? auth.currentUser.email.toLowerCase() : "invitado@mail.com";
        miembrosTemporales = [userEmail];
        document.getElementById('nombreMadre').value = "";
        renderMiembros();
        showView('madreFormView');
    }

    async function addMiembro() {
        const mail = document.getElementById('inputCorreo').value.trim().toLowerCase();
        if(!mail) return;
        if(miembrosTemporales.includes(mail)) return alert("Ya está en la lista");

        if(db) {
            const userCheck = await db.collection("users").where("email", "==", mail).get();
            if(userCheck.empty) return alert("Este correo no está registrado en el cantoral.");
        }
        
        miembrosTemporales.push(mail);
        document.getElementById('inputCorreo').value = "";
        renderMiembros();
    }

    function renderMiembros() {
        const div = document.getElementById('listaMiembrosUI');
        div.innerHTML = miembrosTemporales.map(m => `
            <span class="member-tag">${m} 
            <i class="fas fa-times" onclick="miembrosTemporales = miembrosTemporales.filter(x=>x!=='${m}'); renderMiembros()"></i>
            </span>`).join('');
    }

    async function saveMadre() {
        const nombre = document.getElementById('nombreMadre').value.trim();
        if(!nombre) return alert("Nombre Requerido");

        const data = {
            nombre: nombre,
            miembros: miembrosTemporales,
            creador: auth && auth.currentUser ? auth.currentUser.email : "local",
            fecha: new Date()
        };

        if(db) {
            await db.collection("agendas_madre").add(data);
        } else {
            // Modo local si falla Firebase
            data.id = Date.now().toString();
            data.subAgendas = [];
            agendasMadre.push(data);
            renderMadres();
        }
        showView('madreListView');
    }

    function renderMadres() {
        const container = document.getElementById('madreContainer');
        container.innerHTML = agendasMadre.length ? "" : "<p style='text-align:center; opacity:0.5; margin-top:50px;'>No hay agendas.</p>";
        agendasMadre.forEach(m => {
            container.innerHTML += `<div class="card" onclick="enterMadre('${m.id}')"><h3>${m.nombre}</h3><p>${m.miembros.length} Miembros</p></div>`;
        });
    }

    // --- LÓGICA ACTIVIDADES ---
    function enterMadre(id) {
        currentMadreId = id;
        const m = agendasMadre.find(a => a.id === id);
        document.getElementById('currentMadreTitle').innerText = m.nombre;
        showView('subListView');
    }

    function openSubForm() {
        document.getElementById('tituloSub').value = "";
        document.getElementById('descSub').value = "";
        showView('subFormView');
    }

    function saveSub() {
        const tit = document.getElementById('tituloSub').value.trim();
        if(!tit) return alert("Título Requerido");
        alert("Actividad Guardada");
        showView('subListView');
    }

    // Escuchar cambios de Firebase si está configurado
    if(auth) {
        auth.onAuthStateChanged(user => {
            if (user) {
                db.collection("agendas_madre")
                  .where("miembros", "array-contains", user.email.toLowerCase())
                  .onSnapshot(snap => {
                      agendasMadre = [];
                      snap.forEach(doc => { agendasMadre.push({...doc.data(), id: doc.id}); });
                      renderMadres();
                  });
            }
        });
    }
</script>
</body>
</html>
